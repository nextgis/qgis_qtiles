<!DOCTYPE html>
<html>
<head>
  <title>@{tilesetname} - LeafLet Preview</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/leaflet.css" />
  <link href="css/jquery-ui.min.css" rel="stylesheet" type="text/css"/>

  <style type="text/css">
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #basemapslidercontainer {
      position: absolute;
      top: 50px;
      right: 10px;
      z-index: 1000;
      pointer-events: auto;
    }

    #basemapslider {
      font-size: 62.5%;
      margin: 14px;
      height: 125px;
      width: 7px;
    }
  </style>

  <script src="js/jquery.min.js"></script>
  <script src="js/jquery-ui.min.js"></script>
  <script src="js/leaflet.js"></script>

  <script>
    $(document).ready(function () {
      $("#basemapslider").slider({
        animate: true,
        value: 1,
        orientation: "vertical",
        min: 0,
        max: 1,
        step: 0.1,
        slide: function (event, ui) {
          mytile.setOpacity(ui.value);
        }
      });

      $('#basemapslider').mousedown(function(){
        map.dragging.disable();
      });

      $('#basemapslider').mouseup(function(){
        map.dragging.enable();
      });

      var map = L.map('map').setView([@{centery}, @{centerx}], @{avgzoom});
      var baselayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: 'Map data &copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var mytile = L.tileLayer('@{tilesdir}/{z}/{x}/{y}.@{tilesext}', {
        maxZoom: @{maxzoom},
        tms: @{tms},
        attribution: 'Generated by QTiles'
      }).addTo(map);

      L.control.layers({'Basemap': baselayer}, {'@{tilesetname}': mytile}).addTo(map);
    });
  </script>
</head>
<body>
  <div id="map"></div>
  <div id="basemapslidercontainer">
    <div id="basemapslider"></div>
  </div>
</body>
</html>
